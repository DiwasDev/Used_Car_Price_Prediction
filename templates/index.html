<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Used Car Price Predictor</h1>
            <p>Enter the details below to predict the estimated market value of a vehicle.</p>
        </header>

        <main class="card">
            <form action="/" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <select id="brand" name="brand" required>
                            <option value="">Select Brand</option>
                            {% for b in brands %}
                                <option value="{{ b }}">{{ b }}</option>
                            {% endfor %}
                            <option value="Other">Other / Unknown</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="model_year">Model Year</label>
                        <input type="number" id="model_year" name="model_year" min="1900" max="2027" placeholder="e.g., 2022" required>
                    </div>

                    <div class="form-group">
                        <label for="mileage_num">Mileage (numeric)</label>
                        <input type="number" id="mileage_num" name="mileage_num" min="0" placeholder="e.g., 15000" required>
                    </div>

                    <div class="form-group">
                        <label for="engine_hp">Engine Horsepower (HP)</label>
                        <input type="number" id="engine_hp" name="engine_hp" min="0" step="any" placeholder="e.g., 228" required>
                    </div>

                    <div class="form-group">
                        <label for="engine_displacement">Engine Displacement (Liters)</label>
                        <input type="number" id="engine_displacement" name="engine_displacement" min="0" step="any" placeholder="e.g., 2.4" required>
                    </div>

                    <div class="form-group">
                        <label for="fuel_type">Fuel Type</label>
                        <select id="fuel_type" name="fuel_type" required>
                            <option value="">Select Fuel Type</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="E85 Flex Fuel">E85 Flex Fuel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                            <option value="Plug-In Hybrid">Plug-In Hybrid</option>
                            <option value="Diesel">Diesel</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="transmission_type">Transmission Type</label>
                        <select id="transmission_type" name="transmission_type" required>
                            <option value="">Select Transmission Type</option>
                            <option value="a/t">Automatic</option>
                            <option value="CVT">CVT</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="ext_col">Exterior Color</label>
                        <select id="ext_col" name="ext_col" required>
                            <option value="">Select Exterior Color</option>
                            <option value="Black">Black</option>
                            <option value="Beige">Beige</option>
                            <option value="Gray">Gray</option>
                            <option value="Brown">Brown</option>
                            <option value="Red">Red</option>
                            <option value="Blue">Blue</option>
                            <option value="Orange">Orange</option>
                            <option value="White">White</option>
                            <option value="nan">Other / Unknown</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="int_col">Interior Color</label>
                        <select id="int_col" name="int_col" required>
                            <option value="">Select Interior Color</option>
                            <option value="Black">Black</option>
                            <option value="Beige">Beige</option>
                            <option value="Gray">Gray</option>
                            <option value="Brown">Brown</option>
                            <option value="Red">Red</option>
                            <option value="Blue">Blue</option>
                            <option value="Orange">Orange</option>
                            <option value="White">White</option>
                            <option value="nan">Other / Unknown</option>
                        </select>
                    </div>

                <div class="form-group">
                        <label for="accident">Accident History</label>
                        <select id="accident" name="accident" required>
                            <option value="0">No accidents reported</option>
                            <option value="1">At least 1 accident/damage reported</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="clean_title">Clean Title?</label>
                        <select id="clean_title" name="clean_title" required>
                            <option value="1">Yes</option>
                            <option value="0">No / Not Specified</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="is_sport">Sport Features?</label>
                        <select id="is_sport" name="is_sport" required>
                            <option value="0">No</option>
                            <option value="1">Yes (Sport, S-Line, M Sport)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="is_premium">Premium Features?</label>
                        <select id="is_premium" name="is_premium" required>
                            <option value="0">No</option>
                            <option value="1">Yes (Premium, Platinum, Limited)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="is_4WD_AWD">4WD / AWD?</label>
                        <select id="is_4WD_AWD" name="is_4WD_AWD" required>
                            <option value="0">No</option>
                            <option value="1">Yes (4WD, AWD, xDrive, Quattro)</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Predict Price</button>
                    <a href="/train" class="btn btn-secondary">Train Pipeline</a>
                </div>
            </form>

            {% if context is not none and context != "Rendering" %}
                <div class="result-box">
                    <h2>Prediction Result</h2>
                    {% if context.startswith("Error") %}
                        <p class="error-message">{{ context }}</p>
                    {% else %}
                        <p class="price-prediction">{{ context }}</p>
                    {% endif %}
                </div>
            {% endif %}
        </main>
    </div>
</body>
</html>
