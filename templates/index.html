<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Used Car Price Predictor</h1>
            <p>Enter the details below to predict the estimated market value of a vehicle.</p>
        </header>

        <main class="card">
            <form action="/" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" name="brand" placeholder="e.g., Ford, Lexus, Audi" required>
                    </div>

                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" placeholder="e.g., RX 350, Palisade SEL" required>
                    </div>

                    <div class="form-group">
                        <label for="model_year">Model Year</label>
                        <input type="number" id="model_year" name="model_year" min="1900" max="2027" placeholder="e.g., 2021" required>
                    </div>

                    <div class="form-group">
                        <label for="milage">Mileage (e.g., "51,000 mi." or numeric)</label>
                        <input type="text" id="milage" name="milage" placeholder="e.g., 51,000 mi." required>
                    </div>

                    <div class="form-group">
                        <label for="fuel_type">Fuel Type</label>
                        <select id="fuel_type" name="fuel_type" required>
                            <option value="">Select Fuel Type</option>
                            <option value="Gasoline">Gasoline</option>
                            <option value="E85 Flex Fuel">E85 Flex Fuel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                            <option value="Plug-In Hybrid">Plug-In Hybrid</option>
                            <option value="Diesel">Diesel</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="engine">Engine Description</label>
                        <input type="text" id="engine" name="engine" placeholder="e.g., 3.5L V6 or 300.0HP 3.7L" required>
                    </div>

                    <div class="form-group">
                        <label for="transmission">Transmission</label>
                        <input type="text" id="transmission" name="transmission" placeholder="e.g., 6-Speed A/T, Automatic" required>
                    </div>

                    <div class="form-group">
                        <label for="ext_col">Exterior Color</label>
                        <input type="text" id="ext_col" name="ext_col" placeholder="e.g., Black, Glacier White Metallic" required>
                    </div>

                    <div class="form-group">
                        <label for="int_col">Interior Color</label>
                        <input type="text" id="int_col" name="int_col" placeholder="e.g., Black, Gray, Ebony" required>
                    </div>

                    <div class="form-group">
                        <label for="accident">Accident History</label>
                        <select id="accident" name="accident" required>
                            <option value="None reported">None reported</option>
                            <option value="At least 1 accident or damage reported">At least 1 accident or damage reported</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="clean_title">Clean Title?</label>
                        <select id="clean_title" name="clean_title" required>
                            <option value="Yes">Yes</option>
                            <option value="No">No / Not Specified</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Predict Price</button>
                    <a href="/train" class="btn btn-secondary">Train Pipeline</a>
                </div>
            </form>

            {% if context is not none and context != "Rendering" %}
                <div class="result-box">
                    <h2>Prediction Result</h2>
                    {% if context.startswith("Error") %}
                        <p class="error-message">{{ context }}</p>
                    {% else %}
                        <p class="price-prediction">{{ context }}</p>
                    {% endif %}
                </div>
            {% endif %}
        </main>
    </div>
</body>
</html>
